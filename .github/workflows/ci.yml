name: CI

on:
  push:
    branches: [main, negus]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['18', '20', '22']
        next: ['14', '15', '16']
        exclude:
          - next: '16'
            node: '18'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - run: npm ci
      - run: npm install next@${{ matrix.next }} --no-save
      - run: npm run lint
      - run: npm test
      - run: npm run build
